<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .station-name { fill: #0d5f47; font-family: 'Arial Black', sans-serif; font-weight: 900; font-size: 52px; }
      .tagline { fill: #f9a825; font-family: Arial, sans-serif; font-size: 12px; font-weight: 600; }
      .steam { fill: #f9a825; }
    </style>
  </defs>

  <!-- Steam icon above first M -->
