<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .station-name { fill: #4e2a1e; font-family: 'Arial Black', sans-serif; font-weight: 900; font-size: 52px; }
      .tagline { fill: #8d6e63; font-family: Arial, sans-serif; font-size: 12px; font-weight: 600; }
      .flame { fill: #d84315; }
    </style>
  </defs>

  <!-- Flame icon in the A -->
